<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UPD Scanner — Everlasting Memories</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <style>
    :root {
      --gold: #d4a84b;
      --dark: #1a1a2e;
      --card: #16213e;
      --green: #00b894;
      --red: #e17055;
      --text: #eaeaea;
      --muted: #8a8a9a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }
    .hero {
      background: linear-gradient(135deg, var(--dark) 0%, #16213e 50%, #0f3460 100%);
      padding: 50px 20px 30px;
      text-align: center;
      border-bottom: 2px solid var(--gold);
    }
    .hero h1 { font-size: 2em; color: var(--gold); }
    .hero .date { color: var(--muted); font-size: 0.95em; margin-top: 6px; }
    .nav-links {
      display: flex; gap: 12px; justify-content: center; margin-top: 18px; flex-wrap: wrap;
    }
    .nav-links a {
      color: var(--muted); text-decoration: none; padding: 5px 12px;
      border-radius: 20px; border: 1px solid #333; font-size: 0.82em;
    }
    .nav-links a:hover { border-color: var(--gold); color: var(--gold); }
    .nav-links a.active { border-color: var(--gold); color: var(--gold); background: rgba(212,168,75,0.1); }
    .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }
    
    .controls {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;
    }
    .controls input, .controls select {
      padding: 10px 14px; border-radius: 8px; border: 1px solid #333;
      background: var(--card); color: var(--text); font-size: 0.9em;
    }
    .controls button {
      padding: 10px 24px; border-radius: 8px; background: var(--gold);
      color: var(--dark); font-weight: 700; border: none; cursor: pointer;
    }
    .controls button:hover { background: #c4983b; }
    .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
    .controls label { color: var(--muted); font-size: 0.8em; }

    .scanning { text-align: center; padding: 40px; color: var(--muted); }
    .scanning .spinner {
      display: inline-block; width: 40px; height: 40px;
      border: 3px solid #333; border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card {
      background: var(--card); border-radius: 12px; padding: 20px;
      border: 1px solid #2a2a4a; margin-bottom: 14px;
      transition: transform 0.15s;
    }
    .result-card:hover { transform: translateY(-1px); }
    .result-card .header {
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
    }
    .result-card .ticker { font-size: 1.4em; font-weight: 700; }
    .result-card .price { font-size: 1.2em; font-weight: 600; }
    .result-card .signal { font-size: 0.8em; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
    .bull { background: rgba(0,184,148,0.2); color: var(--green); }
    .bear { background: rgba(225,112,85,0.2); color: var(--red); }
    .neutral { background: rgba(138,138,154,0.2); color: var(--muted); }

    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px,1fr)); gap: 10px; margin-top: 12px; }
    .detail-item { text-align: center; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px; }
    .detail-item .val { font-size: 1.1em; font-weight: 600; }
    .detail-item .lbl { font-size: 0.72em; color: var(--muted); margin-top: 2px; }
    .green { color: var(--green); }
    .red { color: var(--red); }
    .muted { color: var(--muted); }

    .error-box {
      background: rgba(225,112,85,0.1); border: 1px solid var(--red);
      border-radius: 8px; padding: 14px; color: var(--red); text-align: center;
    }

    .footer {
      text-align: center; padding: 30px 20px; color: var(--muted);
      font-size: 0.82em; border-top: 1px solid #2a2a4a; margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>🔍 UPD Scanner</h1>
    <div class="date" id="currentDate"></div>
    <div class="nav-links">
      <a href="dashboard.html">📊 Briefing</a>
      <a href="journal.html">📒 Journal</a>
      <a href="scanner.html" class="active">🔍 Scanner</a>
      <a href="index.html">🏠 Home</a>
    </div>
  </div>

  <div class="container">
    <div class="controls">
      <div><label>Lookback</label><br>
        <select id="lookback">
          <option value="5">5 days</option>
          <option value="10" selected>10 days</option>
          <option value="21">21 days (1 mo)</option>
          <option value="63">63 days (3 mo)</option>
        </select>
      </div>
      <div><label>Interval</label><br>
        <select id="interval">
          <option value="1d">Daily</option>
          <option value="1wk">Weekly</option>
        </select>
      </div>
      <div><label>Min Volume</label><br>
        <select id="minVolume">
          <option value="1000000">1M</option>
          <option value="5000000">5M</option>
          <option value="10000000">10M</option>
          <option value="50000000">50M</option>
        </select>
      </div>
      <button id="scanBtn">🔍 Scan UPD Watchlist</button>
    </div>

    <div id="output"></div>
  </div>

  <div class="footer">
    <p>UPD Scanner · Data from Yahoo Finance · Not financial advice</p>
  </div>

  <script>
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('currentDate').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

    const WATCHLIST = ['JPM','AAPL','GS','AMGN','CAT','BAC','AXP','NVDA','TSLA','AMZN','GOOGL','NFLX','MSFT','META','SPY','QQQ','IWM'];

    // Backtest win rates from real data
    const WIN_RATES = {
      JPM: 77, AAPL: 75, GS: 83, AMGN: 87, CAT: 86, BAC: 73, AXP: 73, NVDA: 73,
      TSLA: 65, AMZN: 72, GOOGL: 70, NFLX: 60, MSFT: 74, META: 77, SPY: 68, QQQ: 70, IWM: 65
    };

    function scoreSignal(ticker, price, sma50, sma200, vol, avgVol, changePct) {
      const wr = WIN_RATES[ticker] || 50;
      let score = 0;
      let signals = [];
      
      // Price above SMA50
      if (price > sma50) { score += 20; signals.push('📈 Above 50-SMA'); }
      else { score -= 10; signals.push('📉 Below 50-SMA'); }
      
      // Price above SMA200 (bull trend)
      if (price > sma200) { score += 25; signals.push('✅ Above 200-SMA'); }
      else { score -= 15; signals.push('⚠️ Below 200-SMA'); }
      
      // SMA50 above SMA200 (golden cross)
      if (sma50 > sma200) { score += 15; signals.push('🥇 Golden Cross'); }
      else { score -= 10; signals.push('💀 Death Cross'); }
      
      // Volume spike
      if (vol > avgVol * 1.5) { score += 15; signals.push('🔥 Volume Spike'); }
      else if (vol > avgVol * 1.2) { score += 8; signals.push('📊 Above Avg Vol'); }
      
      // Momentum (positive change)
      if (changePct > 2) { score += 15; signals.push('🚀 Strong Momentum'); }
      else if (changePct > 0.5) { score += 8; signals.push('📈 Positive'); }
      else if (changePct < -2) { score -= 10; signals.push('🔻 Weak'); }
      
      // Win rate bonus
      if (wr >= 80) { score += 15; signals.push(`🏆 ${wr}% WR`); }
      else if (wr >= 70) { score += 8; signals.push(`✅ ${wr}% WR`); }
      
      // Determine signal
      let signal, signalClass;
      if (score >= 60) { signal = 'Bull'; signalClass = 'bull'; }
      else if (score >= 30) { signal = 'Neutral'; signalClass = 'neutral'; }
      else { signal = 'Bear'; signalClass = 'bear'; }
      
      if (score >= 75) signal = '🟢 STRONG BULL';
      else if (score >= 60) signal = '🟡 BULL';
      else if (score >= 30) signal = '⚪ NEUTRAL';
      else signal = '🔴 BEAR';
      
      return { signal, signalClass, score, signals };
    }

    async function scan() {
      const btn = document.getElementById('scanBtn');
      const output = document.getElementById('output');
      btn.disabled = true;
      btn.textContent = '⏳ Scanning...';
      output.innerHTML = '<div class="scanning"><div class="spinner"></div><p>Fetching price data for all watchlist tickers...</p></div>';
      
      const lookback = document.getElementById('lookback').value;
      const interval = document.getElementById('interval').value;
      const minVol = parseInt(document.getElementById('minVolume').value);
      
      const results = [];
      let errors = [];
      
      for (const ticker of WATCHLIST) {
        try {
          const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=${lookback}d&interval=${interval}`;
          const resp = await fetch(url, { headers: { 'User-Agent': 'Mozilla/5.0' } });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          const meta = data.chart.result[0].meta;
          const quotes = data.chart.result[0].indicators.quote[0];
          const closes = quotes.close.filter(c => c !== null);
          
          const price = meta.regularMarketPrice || closes[closes.length - 1];
          const prevClose = meta.previousClose || closes[closes.length - 2];
          const changePct = ((price - prevClose) / prevClose * 100);
          const vol = quotes.volume.filter(v => v !== null);
          const lastVol = vol[vol.length - 1] || 0;
          const avgVol = vol.reduce((s, v) => s + v, 0) / vol.length;
          
          // Calculate SMAs
          const sma50 = closes.slice(-50).reduce((s, c) => s + c, 0) / Math.min(50, closes.length);
          const sma200 = closes.slice(-200).reduce((s, c) => s + c, 0) / Math.min(200, closes.length);
          
          const result = scoreSignal(ticker, price, sma50, sma200, lastVol, avgVol, changePct);
          
          results.push({
            ticker, price, changePct, lastVol, avgVol,
            sma50: sma50.toFixed(2), sma200: sma200.toFixed(2),
            ...result,
            winRate: WIN_RATES[ticker] || 50
          });
        } catch (e) {
          errors.push(`${ticker}: ${e.message}`);
        }
      }
      
      // Sort by score descending
      results.sort((a, b) => b.score - a.score);
      
      btn.disabled = false;
      btn.textContent = '🔍 Scan UPD Watchlist';
      
      if (errors.length) {
        output.innerHTML += `<div class="error-box">⚠️ ${errors.length} tickers had errors: ${errors.slice(0,3).join(', ')}</div>`;
      }
      
      if (!results.length) {
        output.innerHTML = '<div class="error-box">❌ No results. Check connection or try again.</div>';
        return;
      }
      
      let html = `<div style="margin-bottom:14px;display:flex;gap:12px;flex-wrap:wrap;">
        <div class="result-card" style="flex:1;min-width:120px;text-align:center;padding:14px;">
          <div class="val" style="font-size:1.8em;color:var(--green);">${results.filter(r => r.score >= 60).length}</div>
          <div class="lbl" style="color:var(--muted);font-size:0.8em;">Bullish</div>
        </div>
        <div class="result-card" style="flex:1;min-width:120px;text-align:center;padding:14px;">
          <div class="val" style="font-size:1.8em;color:var(--muted);">${results.filter(r => r.score >= 30 && r.score < 60).length}</div>
          <div class="lbl" style="color:var(--muted);font-size:0.8em;">Neutral</div>
        </div>
        <div class="result-card" style="flex:1;min-width:120px;text-align:center;padding:14px;">
          <div class="val" style="font-size:1.8em;color:var(--red);">${results.filter(r => r.score < 30).length}</div>
          <div class="lbl" style="color:var(--muted);font-size:0.8em;">Bearish</div>
        </div>
      </div>`;
      
      results.forEach(r => {
        const changeClass = r.changePct >= 0 ? 'green' : 'red';
        html += `<div class="result-card">
          <div class="header">
            <div>
              <span class="ticker">${r.ticker}</span>
              <span class="signal ${r.signalClass}" style="margin-left:8px;">${r.signal}</span>
            </div>
            <div class="price">$${r.price.toFixed(2)} <span class="${changeClass}">(${r.changePct >= 0 ? '+' : ''}${r.changePct.toFixed(2)}%)</span></div>
          </div>
          <div class="detail-grid">
            <div class="detail-item"><div class="val">${r.score}</div><div class="lbl">Score</div></div>
            <div class="detail-item"><div class="val" style="color:var(--gold);">${r.winRate}%</div><div class="lbl">Win Rate</div></div>
            <div class="detail-item"><div class="val" style="font-size:0.95em;">$${r.sma50}</div><div class="lbl">50-SMA</div></div>
            <div class="detail-item"><div class="val" style="font-size:0.95em;">$${r.sma200}</div><div class="lbl">200-SMA</div></div>
            <div class="detail-item"><div class="val" style="font-size:0.85em;">${(r.lastVol / 1e6).toFixed(1)}M</div><div class="lbl">Volume</div></div>
          </div>
          <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;">
            ${r.signals.map(s => `<span style="font-size:0.75em;padding:2px 8px;background:rgba(212,168,75,0.1);border-radius:12px;color:var(--muted);">${s}</span>`).join('')}
          </div>
        </div>`;
      });
      
      output.innerHTML = html;
    }

    document.getElementById('scanBtn').addEventListener('click', scan);
    
    // Auto-scan on page load
    scan();
  </script>
</body>
</html>
