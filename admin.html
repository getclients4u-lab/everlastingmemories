<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Everlasting Memories Leads</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F5;
    --beige: #E8DFD4;
    --taupe: #B5A89A;
    --rose: #C4A494;
    --charcoal: #2C2C2C;
    --black: #1A1A1A;
    --gold: #C9A87C;
    --white: #FFFFFF;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Inter', -apple-system, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font-body); background:var(--cream); color:var(--black); line-height:1.6; }
  .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--black); }
  .login-box { background:var(--white); padding:40px; border-radius:12px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
  .login-box h1 { font-family:var(--font-display); margin-bottom:8px; color:var(--black); }
  .login-box p { color:var(--taupe); margin-bottom:24px; }
  .form-group { margin-bottom:20px; }
  .form-group label { display:block; margin-bottom:6px; font-weight:500; font-size:0.9rem; }
  .form-group input { width:100%; padding:12px 16px; border:2px solid var(--beige); border-radius:8px; font-family:inherit; font-size:1rem; transition:border-color .2s; }
  .form-group input:focus { outline:none; border-color:var(--rose); }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:14px 32px; border-radius:999px; font-weight:500; font-size:0.95rem; cursor:pointer; border:none; transition:all .2s; width:100%; }
  .btn-primary { background:var(--black); color:var(--cream); }
  .btn-primary:hover { background:var(--charcoal); transform:translateY(-2px); }
  .error-msg { color:#e74c3c; font-size:0.85rem; margin-top:8px; display:none; }
  .error-msg.show { display:block; }

  .dashboard { display:none; min-height:100vh; }
  .dashboard-header { background:var(--black); color:var(--cream); padding:20px 0; }
  .dashboard-header .container { max-width:1200px; margin:0 auto; padding:0 24px; display:flex; justify-content:space-between; align-items:center; }
  .dashboard-header h1 { font-family:var(--font-display); font-size:1.5rem; }
  .logout-btn { background:transparent; color:var(--cream); border:1px solid var(--taupe); padding:8px 20px; border-radius:999px; cursor:pointer; font-family:inherit; transition:all .2s; }
  .logout-btn:hover { background:var(--cream); color:var(--black); }

  .container { max-width:1200px; margin:0 auto; padding:24px; }
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:32px; }
  .stat-card { background:var(--white); padding:24px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .stat-card h3 { font-size:0.85rem; color:var(--taupe); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
  .stat-card .number { font-family:var(--font-display); font-size:2.5rem; color:var(--rose); font-weight:700; }

  .filters { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
  .filters button { padding:8px 20px; border:2px solid var(--beige); background:var(--white); border-radius:999px; cursor:pointer; font-family:inherit; font-size:0.9rem; transition:all .2s; }
  .filters button:hover, .filters button.active { background:var(--black); color:var(--cream); border-color:var(--black); }

  .leads-table { background:var(--white); border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .leads-table table { width:100%; border-collapse:collapse; }
  .leads-table th { background:var(--beige); padding:16px; text-align:left; font-weight:600; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--charcoal); }
  .leads-table td { padding:16px; border-bottom:1px solid var(--beige); font-size:0.95rem; }
  .leads-table tr:hover { background:var(--cream); }
  .leads-table tr.unread td { font-weight:600; }
  .badge { display:inline-block; padding:4px 12px; border-radius:999px; font-size:0.75rem; font-weight:500; }
  .badge-new { background:#e8f5e9; color:#2e7d32; }
  .badge-contacted { background:#fff3e0; color:#ef6c00; }
  .badge-booked { background:#e3f2fd; color:#1565c0; }
  .badge-completed { background:#f3e5f5; color:#6a1b9a; }
  .lead-name { font-weight:600; color:var(--black); }
  .lead-email { color:var(--taupe); font-size:0.85rem; }
  .lead-date { color:var(--taupe); font-size:0.85rem; }
  .view-btn { background:var(--black); color:var(--cream); border:none; padding:6px 16px; border-radius:999px; cursor:pointer; font-size:0.85rem; transition:all .2s; }
  .view-btn:hover { background:var(--rose); }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:1000; padding:24px; }
  .modal-overlay.active { display:flex; }
  .modal { background:var(--white); border-radius:16px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.3); }
  .modal-header { padding:24px 24px 0; display:flex; justify-content:space-between; align-items:center; }
  .modal-header h2 { font-family:var(--font-display); }
  .modal-close { background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--taupe); }
  .modal-body { padding:24px; }
  .detail-row { margin-bottom:16px; }
  .detail-row label { display:block; font-size:0.8rem; color:var(--taupe); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
  .detail-row p { font-size:1rem; color:var(--black); }
  .detail-row .message-text { background:var(--cream); padding:16px; border-radius:8px; white-space:pre-wrap; }

  .empty-state { text-align:center; padding:60px 24px; color:var(--taupe); }
  .empty-state h3 { font-family:var(--font-display); color:var(--black); margin-bottom:8px; }

  @media (max-width:768px) {
    .leads-table { overflow-x:auto; }
    .leads-table table { min-width:700px; }
    .stats-row { grid-template-columns:repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Everlasting Memories</h1>
    <p>Admin Dashboard - Lead Management</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required placeholder="Enter username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Enter password">
      </div>
      <div class="error-msg" id="errorMsg">Invalid username or password</div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="dashboard-header">
    <div class="container">
      <h1>Lead Dashboard</h1>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="stats-row">
      <div class="stat-card">
        <h3>Total Leads</h3>
        <div class="number" id="totalLeads">0</div>
      </div>
      <div class="stat-card">
        <h3>New This Week</h3>
        <div class="number" id="newLeads">0</div>
      </div>
      <div class="stat-card">
        <h3>Contacted</h3>
        <div class="number" id="contactedLeads">0</div>
      </div>
      <div class="stat-card">
        <h3>Booked</h3>
        <div class="number" id="bookedLeads">0</div>
      </div>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">All Leads</button>
      <button data-filter="new">New</button>
      <button data-filter="contacted">Contacted</button>
      <button data-filter="booked">Booked</button>
      <button data-filter="completed">Completed</button>
      <button id="exportBtn" style="margin-left:auto; background:var(--rose); color:var(--cream); border:none;">Export CSV</button>
    </div>

    <div class="leads-table">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Event Type</th>
            <th>Date Received</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="leadsTableBody">
          <!-- Leads populated by JS -->
        </tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">
        <h3>No leads found</h3>
        <p>New inquiries will appear here when submitted</p>
      </div>
    </div>
  </div>
</div>

<!-- Lead Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Lead Details</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<script>
// Simple auth - in production use proper backend auth
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'Everlasting2026!';
const NOTIFICATION_EMAIL = 'Hey.everlasting.memories@gmail.com';

// Demo leads data - in production this comes from your backend API
let leads = JSON.parse(localStorage.getItem('em_leads') || '[]');

// Check for new leads from contact form (stored by main.js)
const pendingLead = sessionStorage.getItem('em_pending_lead');
if (pendingLead) {
  const lead = JSON.parse(pendingLead);
  leads.unshift(lead);
  localStorage.setItem('em_leads', JSON.stringify(leads));
  sessionStorage.removeItem('em_pending_lead');
  
  // Send email notification (using mailto as fallback)
  sendEmailNotification(lead);
}

// Login
const loginForm = document.getElementById('loginForm');
const loginScreen = document.getElementById('loginScreen');
const dashboard = document.getElementById('dashboard');
const errorMsg = document.getElementById('errorMsg');

loginForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  
  if (user === ADMIN_USER && pass === ADMIN_PASS) {
    sessionStorage.setItem('em_authenticated', 'true');
    showDashboard();
  } else {
    errorMsg.classList.add('show');
  }
});

// Logout
document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('em_authenticated');
  location.reload();
});

// Check auth on load
if (sessionStorage.getItem('em_authenticated') === 'true') {
  showDashboard();
}

function showDashboard() {
  loginScreen.style.display = 'none';
  dashboard.style.display = 'block';
  loadLeads();
}

function loadLeads() {
  // Update stats
  document.getElementById('totalLeads').textContent = leads.length;
  
  const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
  const newThisWeek = leads.filter(l => new Date(l.date) > oneWeekAgo).length;
  document.getElementById('newLeads').textContent = newThisWeek;
  
  const contacted = leads.filter(l => l.status === 'contacted').length;
  document.getElementById('contactedLeads').textContent = contacted;
  
  const booked = leads.filter(l => l.status === 'booked').length;
  document.getElementById('bookedLeads').textContent = booked;
  
  renderTable(leads);
}

function renderTable(data) {
  const tbody = document.getElementById('leadsTableBody');
  const emptyState = document.getElementById('emptyState');
  
  if (data.length === 0) {
    tbody.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  
  emptyState.style.display = 'none';
  tbody.innerHTML = data.map((lead, index) => `
    <tr class="${lead.status === 'new' ? 'unread' : ''}" data-index="${index}">
      <td>
        <div class="lead-name">${escapeHtml(lead.name)}</div>
        <div class="lead-email">${escapeHtml(lead.email)}</div>
      </td>
      <td>${escapeHtml(lead.eventType || 'N/A')}</td>
      <td class="lead-date">${formatDate(lead.date)}</td>
      <td><span class="badge badge-${lead.status || 'new'}">${lead.status || 'new'}</span></td>
      <td><button class="view-btn" onclick="viewLead(${index})">View</button></td>
    </tr>
  `).join('');
}

function viewLead(index) {
  const lead = leads[index];
  const modalBody = document.getElementById('modalBody');
  
  modalBody.innerHTML = `
    <div class="detail-row">
      <label>Name</label>
      <p>${escapeHtml(lead.name)}</p>
    </div>
    <div class="detail-row">
      <label>Email</label>
      <p><a href="mailto:${escapeHtml(lead.email)}">${escapeHtml(lead.email)}</a></p>
    </div>
    <div class="detail-row">
      <label>Phone</label>
      <p>${escapeHtml(lead.phone || 'Not provided')}</p>
    </div>
    <div class="detail-row">
      <label>Event Type</label>
      <p>${escapeHtml(lead.eventType || 'Not specified')}</p>
    </div>
    <div class="detail-row">
      <label>Event Date</label>
      <p>${escapeHtml(lead.eventDate || 'Not specified')}</p>
    </div>
    <div class="detail-row">
      <label>Date Received</label>
      <p>${formatDate(lead.date)}</p>
    </div>
    <div class="detail-row">
      <label>Message</label>
      <div class="message-text">${escapeHtml(lead.message || 'No message')}</div>
    </div>
    <div class="detail-row">
      <label>Update Status</label>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button class="view-btn" onclick="updateStatus(${index}, 'new')" style="background:#e8f5e9; color:#2e7d32;">New</button>
        <button class="view-btn" onclick="updateStatus(${index}, 'contacted')" style="background:#fff3e0; color:#ef6c00;">Contacted</button>
        <button class="view-btn" onclick="updateStatus(${index}, 'booked')" style="background:#e3f2fd; color:#1565c0;">Booked</button>
        <button class="view-btn" onclick="updateStatus(${index}, 'completed')" style="background:#f3e5f5; color:#6a1b9a;">Completed</button>
      </div>
    </div>
  `;
  
  document.getElementById('modalOverlay').classList.add('active');
}

function updateStatus(index, status) {
  leads[index].status = status;
  localStorage.setItem('em_leads', JSON.stringify(leads));
  loadLeads();
  document.getElementById('modalOverlay').classList.remove('active');
}

// Filter buttons
document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const filter = btn.dataset.filter;
    if (filter === 'all') {
      renderTable(leads);
    } else {
      renderTable(leads.filter(l => (l.status || 'new') === filter));
    }
  });
});

// Modal close
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('active');
});
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
});

// Helpers
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return 'N/A';
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// Email notification function
function sendEmailNotification(lead) {
  const subject = `New Lead: ${lead.name} - ${lead.eventType || 'Event Inquiry'}`;
  const body = `
New lead received from Everlasting Memories website!

Name: ${lead.name}
Email: ${lead.email}
Phone: ${lead.phone || 'Not provided'}
Event Type: ${lead.eventType || 'Not specified'}
Event Date: ${lead.eventDate || 'Not specified'}
Date Received: ${formatDate(lead.date)}

Message:
${lead.message || 'No message'}

View all leads: https://everlastingmemories-xi.vercel.app/admin.html
  `.trim();
  
  // Open email client (works on desktop, limited on mobile)
  const mailtoLink = `mailto:${NOTIFICATION_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  
  // Try to open email client
  window.open(mailtoLink, '_blank');
}

// Export to CSV
function exportToCSV() {
  const headers = ['Name', 'Email', 'Phone', 'Event Type', 'Event Date', 'Message', 'Status', 'Date Received'];
  const rows = leads.map(lead => [
    lead.name,
    lead.email,
    lead.phone || '',
    lead.eventType || '',
    lead.eventDate || '',
    (lead.message || '').replace(/"/g, '""'),
    lead.status || 'new',
    lead.date
  ]);
  
  const csvContent = [
    headers.join(','),
    ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
  ].join('\n');
  
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const timestamp = new Date().toISOString().split('T')[0];
  link.href = URL.createObjectURL(blob);
  link.download = `everlasting-memories-leads-${timestamp}.csv`;
  link.click();
}

// Attach export button listener
document.getElementById('exportBtn').addEventListener('click', exportToCSV);

// Demo: Add sample lead if none exist
if (leads.length === 0) {
  const sampleLeads = [
    {
      name: 'Sarah Mitchell',
      email: 'sarah.m@email.com',
      phone: '203-555-0123',
      eventType: 'Baby Shower',
      eventDate: '2026-07-15',
      message: 'Hi! I\'m planning a baby shower for my sister on July 15th. We\'re expecting about 30 guests and would love a neutral-toned balloon garland in blush and gold. The venue is in Stamford. Can you provide a quote?',
      date: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000).toISOString(),
      status: 'new'
    },
    {
      name: 'David Kim',
      email: 'david.kim@company.com',
      phone: '860-555-0456',
      eventType: 'Corporate Event',
      eventDate: '2026-08-20',
      message: 'We need balloon decorations for our annual gala in Hartford. Approximately 200 guests. Looking for elegant white and gold theme with entrance arch and table centerpieces.',
      date: new Date(Date.now() - 5 * 24 * 60 * 60 * 1000).toISOString(),
      status: 'contacted'
    },
    {
      name: 'Elena Rodriguez',
      email: 'elena.r@email.com',
      phone: '203-555-0789',
      eventType: 'Wedding',
      eventDate: '2026-09-10',
      message: 'Hi Isabella! We saw your work at a friend\'s wedding and absolutely loved it. We\'re getting married in New Haven and would love a romantic backdrop with blush and ivory balloons.',
      date: new Date(Date.now() - 10 * 24 * 60 * 60 * 1000).toISOString(),
      status: 'booked'
    }
  ];
  leads = sampleLeads;
  localStorage.setItem('em_leads', JSON.stringify(leads));
}
</script>

</body>
</html>
