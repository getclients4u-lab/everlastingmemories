name: Daily Briefing — Market Data Refresh

on:
  schedule:
    # Runs at 06:00 UTC every day (≈02:00 EST / 03:00 EDT)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch market data
        shell: python
        run: |
          import json, urllib.request, os
          tickers = ["SPY","QQQ","DIA","JPM","AAPL","GS","AMGN","CAT","BAC","AXP","NVDA","TSLA","NFLX","AMZN","GOOGL","IWM"]
          prices = {}
          for t in tickers:
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{t}?range=2d&interval=1d"
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      data = json.loads(resp.read())
                      meta = data["chart"]["result"][0]["meta"]
                      prices[t] = {
                          "current": meta.get("regularMarketPrice", 0),
                          "prevClose": meta.get("previousClose", 0),
                          "changePct": round((meta.get("regularMarketPrice",0)-meta.get("previousClose",0))/meta.get("previousClose",0)*100,2) if meta.get("previousClose") else 0
                      }
              except Exception as e:
                  print(f"  {t}: {e}")
          
          os.makedirs("data", exist_ok=True)
          from datetime import date
          with open("data/market-data.json","w") as f:
              json.dump({"date": date.today().isoformat(), "prices": prices}, f, indent=2)
          print(f"✅ Saved {len(prices)} prices")
      
      - name: Commit and push
        run: |
          git config user.name "Isa (Daily Bot)"
          git config user.email "bot@everlastingmemories.com"
          git add data/market-data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Daily briefing $(date -u +%Y-%m-%d)"
          git push
